name: Build and Upload Release Assets

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release AARs and export JARs
        run: |
          ./gradlew \
            DialogXInterface:exportReleaseJar \
            DialogXMIUIStyle:exportReleaseJar \
            DialogXKongzueStyle:exportReleaseJar \
            DialogXIOSStyle:exportReleaseJar \
            DialogX:exportReleaseJar \
            DialogXMaterialYou:exportReleaseJar

      - name: Collect release AARs
        run: |
          mkdir -p build/release-artifacts
          for module in DialogXInterface DialogXMIUIStyle DialogXKongzueStyle DialogXIOSStyle DialogX DialogXMaterialYou; do
            aar=$(find "${module}/build/outputs/aar" -name "*-release.aar" 2>/dev/null | head -1)
            if [ -n "$aar" ]; then
              cp "$aar" "build/release-artifacts/${module}-release.aar"
            fi
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: build/release-artifacts/*
