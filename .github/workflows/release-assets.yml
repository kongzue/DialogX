name: Build and Upload Release Assets

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release AARs
        run: |
          ./gradlew \
            DialogXInterface:jar \
            DialogXMIUIStyle:assembleRelease \
            DialogXKongzueStyle:assembleRelease \
            DialogXIOSStyle:assembleRelease \
            DialogX:assembleRelease \
            DialogXMaterialYou:assembleRelease

      - name: Collect release AARs
        run: |
          mkdir -p build/release-artifacts
          jar=$(find "DialogXInterface/build/libs" -name "*.jar" 2>/dev/null | head -1)
          if [ -n "$jar" ]; then
            cp "$jar" "build/release-artifacts/DialogXInterface.jar"
          fi
          for module in DialogXMIUIStyle DialogXKongzueStyle DialogXIOSStyle DialogX DialogXMaterialYou; do
            aar=$(find "${module}/build/outputs/aar" -name "*-release.aar" 2>/dev/null | head -1)
            if [ -n "$aar" ]; then
              cp "$aar" "build/release-artifacts/${module}-release.aar"
            fi
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: build/release-artifacts/*
